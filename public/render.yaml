# Render Static Site — MUST publish repo ROOT (dual Mjolnir + Caduceus LIVE v24)
services:
  - type: web
    name: telephantim-hub
    runtime: static
    branch: master
    staticPublishPath: .
    buildCommand: ""
    headers:
      - path: /*
        name: Cache-Control
        value: "no-store, no-cache, must-revalidate, max-age=0"
      - path: /*
        name: Pragma
        value: "no-cache"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
