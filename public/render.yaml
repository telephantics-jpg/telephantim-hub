# Render Static Site — files at repo ROOT (index.html, styles.css, mjolnir.js)
services:
  - type: web
    name: telephantim-hub
    runtime: static
    # Publish whole repo root so deploy matches GitHub Pages
    staticPublishPath: .
    buildCommand: ""
    headers:
      - path: /*
        name: Cache-Control
        value: "public, max-age=60"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
