<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telephantix Embed</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body.embed header,
    body.embed .hint,
    body.embed .desktop-hint { display: none; }
    body.embed .side-dock {
      top: 0.6rem;
      left: 0.5rem;
      width: min(240px, 46vw);
    }
    body.embed .dock-controls,
    body.embed .dock-secondary { display: none; }
    body.embed .bio-shell {
      width: min(300px, 48vw);
      min-width: 200px;
      padding-top: 0.6rem;
    }
  </style>
</head>
<body class="embed has-bio site-home">
  <div id="canvas-wrap"></div>
  <div class="vignette"></div>
  <div class="flash" id="flash"></div>

  <aside class="side-dock">
    <a class="luna-camp-btn" href="https://telephanti.com/firmament/play" target="_blank" rel="noopener noreferrer">
      <span class="luna-camp-glow"></span>
      <span class="luna-camp-icon">🏕️</span>
      <span class="luna-camp-copy">
        <strong>Luna Camp</strong>
        <small>Open camp</small>
      </span>
      <span class="luna-camp-arrow">→</span>
    </a>
  </aside>

  <div class="bio-shell">
    <div class="bio-card">
      <div class="bio-head">
        <img class="bio-avatar" alt="Telephantix"
          src="https://cdn.beacons.ai/user_content/gH8ZHlL6aqeSAOZ8y4thx8RoSXG3/profile_telephantix.png?t=1783265767591"
          referrerpolicy="no-referrer" />
        <div class="bio-meta">
          <h1>Telephantix</h1>
          <p class="handle">@telephantix</p>
        </div>
      </div>
      <section class="bio-section">
        <h2>Support / Pay</h2>
        <div class="bio-links">
          <a class="bio-link compact" style="--link-accent:#003087" href="https://www.paypal.com/donate/?hosted_button_id=7Q29UNGPVFAT4" target="_blank" rel="noopener noreferrer">
            <span class="bio-link-icon">💙</span>
            <span class="bio-link-text"><strong>PayPal</strong></span>
            <span class="bio-link-arrow">→</span>
          </a>
          <a class="bio-link compact" style="--link-accent:#00d632" href="https://cash.app/$Telephantix" target="_blank" rel="noopener noreferrer">
            <span class="bio-link-icon">💵</span>
            <span class="bio-link-text"><strong>Cash App</strong></span>
            <span class="bio-link-arrow">→</span>
          </a>
          <a class="bio-link compact" style="--link-accent:#3d95ce" href="https://venmo.com/u/Telephantix" target="_blank" rel="noopener noreferrer">
            <span class="bio-link-icon">💙</span>
            <span class="bio-link-text"><strong>Venmo</strong></span>
            <span class="bio-link-arrow">→</span>
          </a>
          <a class="bio-link compact" style="--link-accent:#02a95c" href="https://gofund.me/52108a9d" target="_blank" rel="noopener noreferrer">
            <span class="bio-link-icon">💚</span>
            <span class="bio-link-text"><strong>GoFundMe</strong></span>
            <span class="bio-link-arrow">→</span>
          </a>
        </div>
      </section>
    </div>
  </div>

  <!-- Hidden controls so mjolnir.js still binds -->
  <div style="display:none">
    <div id="toggle-rotate" class="toggle on"></div>
    <div id="toggle-aura" class="toggle on"></div>
    <input id="spin-speed" type="range" value="35" />
    <button id="btn-strike" type="button"></button>
    <button id="btn-reset" type="button"></button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="mjolnir.js"></script>
</body>
</html>
